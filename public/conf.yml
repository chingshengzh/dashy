pageInfo:
  title: 資安小圈圈
  description: 亂點會進入教育訓練名單
  navLinks:
    - title: ISMS文件
      path: https://你的內部維基網址

appConfig:
  theme: newone
  language: zh-TW  # 加上這行，系統介面瞬間中文化
  layout: auto     # 讓系統自動幫你把卡片排得整整齊齊
  customCss: |
    html[data-theme="newone"] {
      --primary: #87c2d9;
      --background: #0b1021;
      --background-darker: #05070e35;
      --item-background: #1e253c;
      --item-background-hover: #2a3454;
      --item-shadow: 0 4px 6px rgba(0,0,0,0.3);
      --item-hover-shadow: 0 8px 12px rgba(0,0,0,0.5);
      --item-group-heading-text-color: #ffffff;
      --item-group-heading-text-color-hover: #87c2d9;
    }

sections:
  # --------------------
  # 1. 系統監控大廳
  # --------------------
  - name: 系統監控大廳
    icon: fas fa-network-wired
    displayData:
      cols: 2 # 讓監控區塊佔據較大的版面
    items:
      - title: UP 監控系統
        description: 核心網路流量監測
        icon: fas fa-chart-line
        url: http://YOUR_UPTIME_IP/
        target: newtab
      - title: Prometheus
        description: 雲端原生指標搜集
        icon: fas fa-server
        url: http://YOUR_PROMETHEUS_IP/
        target: newtab

  # --------------------
  # 2. ISMS 規範文件庫
  # --------------------
  - name: ISMS 規範文件庫
    icon: fas fa-folder-open
    displayData:
      cols: 1
    items:
      - title: A.5 資訊安全政策
        icon: fas fa-file-pdf
        url: #
      - title: A.6 資訊安全組織
        icon: fas fa-file-pdf
        url: #
      - title: A.7 人力資源安全
        icon: fas fa-file-pdf
        url: #
      - title: A.8 資產管理
        icon: fas fa-file-pdf
        url: #

  # --------------------
  # 3. 資安管理室公告與任務
  # --------------------
  - name: 每日任務與公告
    icon: fas fa-thumbtack
    displayData:
      cols: 1
    items:
      - title: 機房巡檢表
        description: 每日例行檢查
        icon: fas fa-clipboard-check
        url: #
      - title: 備份確認日誌
        description: 確認 NAS 同步狀態
        icon: fas fa-cloud-upload-alt
        url: #

  # --------------------
  # 4. 全球即時威脅情報
  # --------------------
  - name: 全球即時威脅情報
    icon: fas fa-globe
    displayData:
      cols: 2
    widgets:
      - type: rss-feed
        options:
          # 使用 CORS Proxy 包裝 TWCERT 的網址，解決 Vercel 讀不到的問題
          rssUrl: https://corsproxy.io/?https://www.twcert.org.tw/tw/rss-16-1.xml
          limit: 5
